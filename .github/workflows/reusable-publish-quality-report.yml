name: Deprecated Publish Quality Report Wrapper

on:
  workflow_call:
    inputs:
      report-title:
        type: string
        required: false
      artifact-pattern:
        type: string
        required: false
        default: quality-*
      input-path:
        type: string
        required: false
        default: quality-artifacts
      config-path:
        type: string
        required: false
        default: .github/quality-report.yml
      deploy-pages:
        type: boolean
        required: false
        default: true

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    uses: ./.github/workflows/publish-quality-report.yml
    with:
      report-title: ${{ inputs.report-title }}
      artifact-pattern: ${{ inputs.artifact-pattern }}
      input-path: ${{ inputs.input-path }}
      config-path: ${{ inputs.config-path }}
      deploy-pages: ${{ inputs.deploy-pages }}
