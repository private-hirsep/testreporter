name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run check:workflows-docs
      - run: npm run quality-report -- validate --config examples/minimal/quality-report.yml --quality-gates examples/minimal/quality-gates.yml --input examples/minimal/quality-artifacts --quality-profile relaxed
      - run: npm run quality-report -- generate --config examples/minimal/quality-report.yml --quality-gates examples/minimal/quality-gates.yml --input examples/minimal/quality-artifacts --output dist/example-report-relaxed --quality-profile relaxed --zip
      - run: npm run quality-report -- generate --config examples/minimal/quality-report.yml --quality-gates examples/minimal/quality-gates.yml --input examples/minimal/quality-artifacts --output dist/example-report-strict --quality-profile strict --no-fail-on-quality-gate --zip
      - name: Smoke check generated report files
        shell: bash
        run: |
          set -euo pipefail
          for file in \
            dist/example-report-relaxed/index.html \
            dist/example-report-relaxed/404.html \
            dist/example-report-relaxed/data/manifest.json \
            dist/example-report-relaxed/meta/pr-comment-minimal.md \
            dist/example-report-relaxed/meta/pr-comment-full.md \
            dist/example-report-relaxed/meta/quality-summary.json \
            dist/example-report-strict/index.html \
            dist/example-report-strict/404.html \
            dist/example-report-strict/data/manifest.json \
            dist/example-report-strict/meta/pr-comment-minimal.md \
            dist/example-report-strict/meta/pr-comment-full.md \
            dist/example-report-strict/meta/quality-summary.json; do
            test -f "$file"
          done
          strict_status="$(node -e "console.log(require('./dist/example-report-strict/meta/quality-summary.json').qualityGateStatus)")"
          test "$strict_status" = "failed"

  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3
