name: Portfolio example
on: { workflow_dispatch: {} }
jobs:
  portfolio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with: { pattern: project-quality-summary-*, path: summaries, merge-multiple: true }
      - run: npm ci && npm run build
      - run: npm run quality-report -- portfolio --input summaries --output portfolio --stale-days 7
      - uses: actions/upload-pages-artifact@v3
        with: { path: portfolio }
