name: Central quality attention portfolio
on: { workflow_dispatch: {} }
permissions: { actions: read, contents: read, pages: write, id-token: write }
jobs:
  portfolio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { persist-credentials: false }
      - uses: actions/download-artifact@v4
        with:
          pattern: project-quality-summary-*
          path: project-summaries
          merge-multiple: false
      - run: npm ci && npm run build
      - run: npm run quality-report -- portfolio --input project-summaries --output portfolio
      - uses: actions/upload-pages-artifact@v3
        with: { path: portfolio }
