<!doctype html>
<meta charset="utf-8" />
<title>Quality Report</title>
<script>
  const knownRoutes = new Set(["tests", "coverage", "requirements", "security", "downloads", "diagnostics", "history"]);
  const parts = window.location.pathname.split("/").filter(Boolean);
  if (parts.length && parts[parts.length - 1].toLowerCase() === "404.html") parts.pop();
  const first = parts[0] || "";
  const isRootRoute = knownRoutes.has(first);
  const base = isRootRoute ? "" : first ? `/${first}` : "";
  const route = isRootRoute ? parts.join("/") : parts.slice(1).join("/");
  const query = window.location.search || "";
  const hash = window.location.hash || "";
  const hashRoute = hash.startsWith("#/") ? hash : `#/${route}${query}`;
  window.location.replace(`${window.location.origin}${base}/${hashRoute}`);
</script>
