name: Generate Quality Report
description: Generate a static quality report from CI artifacts
inputs:
  config-path:
    description: Path to quality-report.yml
    required: false
    default: quality-report.yml
  input-path:
    description: Artifact input directory
    required: false
    default: quality-artifacts
  output-path:
    description: Static report output directory
    required: false
    default: dist/report
  create-zip:
    description: Create quality-report.zip
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
    - shell: bash
      run: npm ci
    - shell: bash
      run: npm run build
    - shell: bash
      run: >
        node packages/report-cli/dist/index.js generate
        --config "${{ inputs.config-path }}"
        --input "${{ inputs.input-path }}"
        --output "${{ inputs.output-path }}"
        ${{ inputs.create-zip == 'true' && '--zip' || '' }}
